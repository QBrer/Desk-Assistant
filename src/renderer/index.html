<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>玲音 — 桌面助手</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="styles/index.css">
  <link rel="stylesheet" href="styles/effects.css">
  <link rel="stylesheet" href="styles/character.css">
  <link rel="stylesheet" href="styles/chat.css">
</head>
<body>
  <!-- 背景特效层 -->
  <canvas id="matrix-canvas" class="matrix-bg"></canvas>
  <div class="scanlines"></div>

  <!-- 主容器 -->
  <div id="app" class="app-container">

    <!-- 标题栏（拖拽区域） -->
    <div class="titlebar" id="titlebar">
      <div class="titlebar-status">
        <span class="status-dot"></span>
        <span class="status-text">LAIN.SYSTEM</span>
      </div>
      <div class="titlebar-actions">
        <button class="titlebar-btn" id="btn-pin" title="置顶切换">
          <svg width="12" height="12" viewBox="0 0 12 12"><path d="M6 1v10M1 3l5-2 5 2" stroke="currentColor" fill="none" stroke-width="1.5"/></svg>
        </button>
        <button class="titlebar-btn" id="btn-minimize" title="最小化">
          <svg width="12" height="12" viewBox="0 0 12 12"><line x1="2" y1="6" x2="10" y2="6" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
        <button class="titlebar-btn btn-close" id="btn-close" title="隐藏">
          <svg width="12" height="12" viewBox="0 0 12 12"><line x1="2" y1="2" x2="10" y2="10" stroke="currentColor" stroke-width="1.5"/><line x1="10" y1="2" x2="2" y2="10" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
      </div>
    </div>

    <!-- 角色展示区 -->
    <div class="character-section" id="character-section">
      <div class="character-container" id="character-container">
        <div class="character-glow"></div>
        <img id="character-img" class="character-img" src="assets/lain/idle.png" alt="Lain" draggable="false">
        <div class="character-glitch-overlay" id="glitch-overlay"></div>
      </div>
      <div class="character-name-tag">
        <span class="char-name" data-text="LAIN">LAIN</span>
        <span class="char-status" id="char-status-text">CONNECTED</span>
      </div>
    </div>

    <!-- 对话区域 -->
    <div class="chat-section" id="chat-section">
      <div class="chat-messages" id="chat-messages">
        <!-- 初始欢迎消息 -->
        <div class="message message-lain">
          <div class="message-avatar">L</div>
          <div class="message-content">
            <div class="message-text">...你好。我是玲音。<br>有什么需要我帮忙的吗。</div>
          </div>
        </div>
      </div>

      <!-- 确认对话框 -->
      <div class="confirm-dialog hidden" id="confirm-dialog">
        <div class="confirm-text" id="confirm-text"></div>
        <div class="confirm-actions">
          <button class="confirm-btn confirm-yes" id="confirm-yes">确认</button>
          <button class="confirm-btn confirm-no" id="confirm-no">取消</button>
        </div>
      </div>

      <!-- 输入区域 -->
      <div class="chat-input-section">
        <div class="input-wrapper">
          <textarea id="chat-input" class="chat-input" placeholder="在这里输入消息..." rows="1"></textarea>
          <button class="send-btn" id="send-btn" title="发送">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="input-hint">
          <span class="hint-key">Enter</span> 发送 · <span class="hint-key">Shift+Enter</span> 换行 · <span class="hint-key">Ctrl+Shift+L</span> 唤出
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="scripts/effects.js"></script>
  <script src="scripts/character.js"></script>
  <script src="scripts/chat.js"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
